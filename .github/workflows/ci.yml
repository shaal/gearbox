name: CI

# The protocol contract: the frozen test vectors in docs/protocol/testvectors/ are
# authoritative, and the Rust and Python reference implementations MUST agree with them
# byte-for-byte. These jobs enforce that contract on every push and pull request so a
# canonicalization/signing drift can never merge silently.

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # The published throwaway seed + key id used by the frozen test vectors. Not a secret.
  TV_SEED: 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
  TV_KEY_ID: gearbox-testvector-2026
  TV_GENERATED_AT: 2026-06-10T00:00:00Z

jobs:
  # ---- Required: the Rust reference reproduces the frozen vectors ----
  rust:
    name: Rust (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/gearbox
      - name: Build
        run: cargo build --manifest-path crates/gearbox/Cargo.toml --locked
      - name: Test (vectors + parity + resolve + store + server)
        run: cargo test --manifest-path crates/gearbox/Cargo.toml --locked

  # ---- Required: the Python reference reproduces the frozen vectors ----
  python:
    name: Python (selftest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install reference deps
        run: pip install -r tools/requirements.txt
      - name: Self-test (conformance + e2e + verify)
        run: bash tools/selftest.sh

  # ---- Required: the two implementations agree byte-for-byte ----
  # Each implementation signs a catalog from the same testdata; the other verifies it,
  # and the resulting Ed25519 signatures must be byte-identical. This is the cross-impl
  # guarantee the README promises ("Rust <-> Python in agreement").
  parity:
    name: Cross-impl parity (Rust <-> Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/gearbox
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r tools/requirements.txt
      - run: cargo build --manifest-path crates/gearbox/Cargo.toml --locked
      - name: Sign in each impl, verify with the other, compare signatures
        run: |
          set -euo pipefail
          BIN=crates/gearbox/target/debug/gearbox
          PUB=$(cd tools && python3 -c "from cogstore.signing import public_key_b64; \
            print(public_key_b64(bytes.fromhex('${TV_SEED}')))")

          # Python signs -> Rust verifies
          python3 tools/catalog_gen.py \
            --cogs-dir tools/testdata/cogs --artifacts-dir tools/testdata/artifacts \
            --store-id cognitum-official --generated-at "${TV_GENERATED_AT}" \
            --out py.json --sign-seed-hex "${TV_SEED}" --key-id "${TV_KEY_ID}"
          "$BIN" verify py.json --key-id "${TV_KEY_ID}" --pubkey-b64 "$PUB"

          # Rust signs -> Python verifies
          "$BIN" catalog \
            --cogs-dir tools/testdata/cogs --artifacts-dir tools/testdata/artifacts \
            --store-id cognitum-official --generated-at "${TV_GENERATED_AT}" \
            --out rs.json --sign-seed-hex "${TV_SEED}" --key-id "${TV_KEY_ID}"
          python3 tools/verify_catalog.py rs.json --key-id "${TV_KEY_ID}" --pubkey-b64 "$PUB"

          # Signatures must be byte-identical (deterministic Ed25519 over identical JCS bytes)
          SIG_PY=$(python3 -c "import json;print(json.load(open('py.json'))['signature']['sig'])")
          SIG_RS=$(python3 -c "import json;print(json.load(open('rs.json'))['signature']['sig'])")
          echo "py: $SIG_PY"
          echo "rs: $SIG_RS"
          test "$SIG_PY" = "$SIG_RS" || { echo "::error::Rust/Python signatures diverge"; exit 1; }
          echo "Cross-impl signatures are byte-identical."

      - name: Air-gap bundle manifest — Rust exports, Python re-signs + verifies byte-for-byte
        run: |
          set -euo pipefail
          BIN=crates/gearbox/target/debug/gearbox

          # A store + signed catalog over the adversarial cog (no external assets -> self-contained).
          mkdir -p work/cogs/adversarial
          cp tools/testdata/cogs/adversarial/cog.toml work/cogs/adversarial/cog.toml
          "$BIN" store-info create --store-id gearbox-bundle-testvector --name "Bundle Test Store" \
            --description "parity" --catalog-url "file://./app-registry.json" \
            --key-id "${TV_KEY_ID}" --sign-seed-hex "${TV_SEED}" --out work/store.json
          "$BIN" catalog --cogs-dir work/cogs --artifacts-dir tools/testdata/artifacts \
            --store-id gearbox-bundle-testvector --generated-at "${TV_GENERATED_AT}" \
            --out work/app-registry.json --sign-seed-hex "${TV_SEED}" --key-id "${TV_KEY_ID}"

          # Rust produces + signs the bundle manifest...
          "$BIN" export --catalog work/app-registry.json --store-info work/store.json \
            --artifacts-dir tools/testdata/artifacts --out work/bundle \
            --generated-at "${TV_GENERATED_AT}" --sign-seed-hex "${TV_SEED}" --key-id "${TV_KEY_ID}"
          # ...Python rebuilds + signs it over the same bytes; signatures must be byte-identical,
          #    and Python then verifies the whole Rust-produced bundle (Rust signs -> Python verifies).
          python3 tools/bundle_parity.py work/bundle
          # Rust verifies its own bundle too (the file:// import path).
          "$BIN" import work/bundle

      - name: Audit hash chain — Rust appends, Python rebuilds byte-for-byte + cross-verifies
        run: |
          set -euo pipefail
          BIN=crates/gearbox/target/debug/gearbox
          LOG=audit.jsonl; rm -f "$LOG" "$LOG".rebuilt.jsonl

          # Rust appends a scripted add_store -> verify_catalog -> install -> policy_deny chain
          # (the policy_deny detail carries a non-ASCII em-dash to exercise the UTF-8 JCS path).
          "$BIN" audit append --log "$LOG" --ts 2026-06-14T15:00:00Z --event add_store \
            --subject acme-internal --detail key_id=acme-signing-2026 --detail result=ok
          "$BIN" audit append --log "$LOG" --ts 2026-06-14T15:01:00Z --event verify_catalog \
            --subject acme-internal --detail result=ok
          "$BIN" audit append --log "$LOG" --ts 2026-06-14T15:02:00Z --event install \
            --subject acme-internal/doom@0.1.0 --detail sha256=abcd --detail result=ok
          "$BIN" audit append --log "$LOG" --ts 2026-06-14T15:03:00Z --event policy_deny \
            --subject cognitum-official/doom --detail "reason=store not allowed — managed" --detail result=deny

          # Python verifies the Rust log and rebuilds it byte-for-byte (Rust -> Python)...
          python3 tools/audit_parity.py "$LOG"
          # ...then Rust verifies the Python-rebuilt log (Python -> Rust).
          "$BIN" audit verify --log "$LOG".rebuilt.jsonl

  # ---- Required: style + lints. ----
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/gearbox
      - name: rustfmt
        run: cargo fmt --manifest-path crates/gearbox/Cargo.toml --check
      - name: clippy
        run: cargo clippy --manifest-path crates/gearbox/Cargo.toml --all-targets -- -D warnings

  # ---- Required: supply-chain (vuln advisories, licenses, bans, sources) for the
  #      gearbox tooling's own dependencies. A signing tool should hold itself to the
  #      bar it sets for cogs. ----
  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/gearbox/Cargo.toml
          command: check advisories bans licenses sources
